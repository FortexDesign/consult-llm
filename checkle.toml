[[check]]
name = "format-check"
mode = "rustfmt"
command = ["cargo", "fmt", "--all", "--", "--check"]

[[check]]
name = "clippy"
mode = "cargo"
command = ["cargo", "clippy", "--workspace", "--all-targets", "--locked", "--message-format=json"]

[[check]]
name = "test"
mode = "cargo"
command = ["cargo", "test", "--workspace", "--locked", "--message-format=json"]

[[check]]
name = "build"
mode = "cargo"
command = ["cargo", "build", "--workspace", "--all-targets", "--locked", "--message-format=json"]

[[group]]
name = "all"
checks = ["format-check", "clippy", "test", "build"]
